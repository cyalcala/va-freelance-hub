name: 🩺 Sovereign Verifier Pulse

on:
  schedule:
    - cron: '0 */12 * * *' # Every 12 hours
  workflow_dispatch: 

concurrency:
  group: gha-verifier-pipeline
  cancel-in-progress: false

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  verify:
    name: Execute Link & Age Audit (Verifier)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PROXY_SECRET: ${{ secrets.PROXY_SECRET }}
      VERIFY_API_URL: "https://remotejobs-ph.pages.dev/api/cron/verify-links"
    
    steps:
      - name: 🩺 Execute Link Verification API
        run: |
          HTTP_CODE=$(curl -s -w "%{http_code}" -o verify.log -X POST "$VERIFY_API_URL" \
            -H "Authorization: Bearer $PROXY_SECRET" \
            -H "x-cron-secret: $PROXY_SECRET" \
            -H "Content-Type: application/json")
          
          echo "HTTP Status: $HTTP_CODE"
          cat verify.log
          echo ""

          # Fail on any non-2xx, including curl connection failures ("000").
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "::error::Verify API returned HTTP $HTTP_CODE"
            exit 1
          fi
          
      - name: 📊 Generate Verifier Summary
        if: always()
        continue-on-error: true
        run: |
          CHECKED=$(jq -r '.checked // 0' verify.log || echo "0")
          ARCHIVED=$(jq -r '.autoArchived // 0' verify.log || echo "0")
          DEACTIVATED=$(jq -r '.deactivated // 0' verify.log || echo "0")
          NEVER_VERIFIED=$(jq -r '.neverVerifiedRemaining // -1' verify.log || echo "-1")
          echo "### 🩺 Sovereign Verifier Report" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ✅ Verification Audit Concluded" >> $GITHUB_STEP_SUMMARY
          echo "- **Links Checked**: $CHECKED" >> $GITHUB_STEP_SUMMARY
          echo "- **Dead Links Pruned**: $DEACTIVATED" >> $GITHUB_STEP_SUMMARY
          echo "- **Stale Jobs Archived (>30d)**: $ARCHIVED" >> $GITHUB_STEP_SUMMARY
          echo "- **Never-Verified Backlog Remaining**: $NEVER_VERIFIED" >> $GITHUB_STEP_SUMMARY
          echo "- **Timestamp**: $(date)" >> $GITHUB_STEP_SUMMARY
          if [ "$NEVER_VERIFIED" -gt 300 ]; then
            echo "::warning title=Verification backlog growing::$NEVER_VERIFIED active jobs have never been link-verified. Consider raising the per-run verify limit."
          fi
