name: 🚀 Deploy Database Migrations

on:
  push:
    branches:
      - main
    paths:
      - 'packages/db/migrations/**'

jobs:
  migrate:
    name: Apply D1 Migrations
    runs-on: ubuntu-latest
    steps:
      - name: 🛑 Checkout Repository
        uses: actions/checkout@v4

      - name: 🥟 Setup Bun Runtime
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: 📦 Install Dependencies
        run: bun install

      - name: 🚀 Apply D1 Migrations to Production
        working-directory: apps/web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          bunx wrangler d1 execute remoteph-jobs-db --remote --file=../../packages/db/migrations/0010_thankful_shadowcat.sql || true
          bunx wrangler d1 migrations apply remoteph-jobs-db --remote --mark-applied
