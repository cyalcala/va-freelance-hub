name: 🛡️ Sovereign CI Guardrail

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Serialize per-ref so two close pushes (e.g. a Sentinel PAT merge and a
# Hunter rollup commit) cannot deploy out of order — an older commit's build
# finishing last would otherwise overwrite a newer production deployment.
# cancel-in-progress:false keeps the latest run queued rather than dropped.
concurrency:
  group: ci-guardrail-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    name: Build & Type Audit
    runs-on: ubuntu-latest
    steps:
      - name: 🛑 Checkout Repository
        uses: actions/checkout@v4

      - name: 🥟 Setup Bun Runtime
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: 📦 Install Dependencies
        run: bun install

      - name: 🧪 Run Unit Tests
        run: bun test

      - name: 🏗️ Build App (Astro check + build)
        run: bun run build

      - name: 🚀 Deploy to Cloudflare Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: bunx wrangler pages deploy apps/web/dist --project-name remotejobs-ph
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
