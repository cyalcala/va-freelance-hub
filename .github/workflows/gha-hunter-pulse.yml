name: 🏹 Sovereign Hunter Pulse

on:
  schedule:
    - cron: '*/30 * * * *' # Every 30 minutes
  workflow_dispatch: 

concurrency:
  group: gha-hunter-pipeline
  cancel-in-progress: false

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  hunt:
    name: Execute Signal Safari (Hunter)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PROXY_SECRET: ${{ secrets.PROXY_SECRET }}
      INGEST_API_URL: "https://remotejobs-ph.pages.dev/api/ingest" 
      SCRAPE_API_URL: "https://remotejobs-ph.pages.dev/api/cron/scrape"
    
    steps:
      - name: 🛑 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 🥟 Setup Bun Runtime
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: 📦 Install Dependencies
        run: bun install

      - name: 🏹 Deploy the ATS Engine (Layer 2)
        run: |
          curl -X POST "$SCRAPE_API_URL" \
            -H "x-cron-secret: $PROXY_SECRET" \
            -H "Content-Type: application/json" \
            -s > harvest.log
          
          cat harvest.log
          
          TOTAL=$(grep -oP '"inserted":\s*\K\d+' harvest.log || echo "0")
          echo "TOTAL=$TOTAL" >> $GITHUB_ENV

      - name: 📊 Generate Pulse Summary
        if: always()
        continue-on-error: true
        run: |
          echo "### 🏹 Sovereign Hunter Report" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ✅ Signal Safari Concluded" >> $GITHUB_STEP_SUMMARY
          echo "- **Signals Harvested**: $TOTAL" >> $GITHUB_STEP_SUMMARY
          echo "- **Timestamp**: $(date)" >> $GITHUB_STEP_SUMMARY
