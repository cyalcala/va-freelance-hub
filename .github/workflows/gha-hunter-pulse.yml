name: 🏹 Sovereign Hunter Pulse

on:
  schedule:
    - cron: '*/30 * * * *' # Every 30 minutes
  workflow_dispatch: 

concurrency:
  group: gha-hunter-pipeline
  cancel-in-progress: false

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  hunt:
    name: Execute Signal Safari (Hunter)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PROXY_SECRET: ${{ secrets.PROXY_SECRET }}
      INGEST_API_URL: "https://remotejobs-ph.pages.dev/api/ingest" 
      SCRAPE_API_URL: "https://remotejobs-ph.pages.dev/api/cron/scrape"
    
    steps:
      - name: 🛑 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 🥟 Setup Bun Runtime
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: 📦 Install Dependencies
        run: bun install

      - name: 🏹 Deploy the ATS Engine (Layer 2)
        run: |
          curl -X POST "$SCRAPE_API_URL" \
            -H "x-cron-secret: $PROXY_SECRET" \
            -H "Content-Type: application/json" \
            -s > harvest.log
          
          cat harvest.log
          
          TOTAL=$(grep -oP '"inserted":\s*\K\d+' harvest.log || echo "0")
          echo "TOTAL=$TOTAL" >> $GITHUB_ENV

      - name: 🚨 Auto-Document Failures (Self-Healing Log)
        if: always()
        run: |
          HAS_CHANGES=false
          mkdir -p docs
          if [ ! -f docs/scraper-alerts.md ]; then
            echo -e "# Scraper Alerts Log\n\nThis file automatically logs scraper failures so the AI has a trail of what broke without needing to bother the human.\n\n" > docs/scraper-alerts.md
          fi
          
          # 1. Total Failure Check (0 jobs scraped)
          if grep -q '"inserted":\s*0' harvest.log && grep -q '"skipped":\s*0' harvest.log; then
            echo "Critical failure or 0 jobs found."
            echo "- **[$(date -u +"%Y-%m-%dT%H:%M:%SZ")]**: 🚨 Scraper API returned 0 inserted and 0 skipped. Possible global source breakage or Cloudflare error." >> docs/scraper-alerts.md
            HAS_CHANGES=true
          fi
          
          # 2. Individual Source Failure Check (Silent Errors)
          FAILED_SOURCES=$(jq -r '.failedSources[]?' harvest.log || true)
          if [ ! -z "$FAILED_SOURCES" ]; then
            echo "Individual sources failed."
            while IFS= read -r source_error; do
              echo "- **[$(date -u +"%Y-%m-%dT%H:%M:%SZ")]**: ⚠️ Partial Scrape Failure: $source_error" >> docs/scraper-alerts.md
            done <<< "$FAILED_SOURCES"
            HAS_CHANGES=true
          fi
          
          # 3. Commit to GitHub
          if [ "$HAS_CHANGES" = true ]; then
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            git add docs/scraper-alerts.md
            
            if ! git diff --cached --quiet; then
              git commit -m "chore(scraper): auto-logged scraper alert"
              git push
              echo "Alert documented in GitHub."
            fi
          fi

      - name: 📊 Generate Pulse Summary
        if: always()
        continue-on-error: true
        run: |
          echo "### 🏹 Sovereign Hunter Report" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ✅ Signal Safari Concluded" >> $GITHUB_STEP_SUMMARY
          echo "- **Signals Harvested**: $TOTAL" >> $GITHUB_STEP_SUMMARY
          echo "- **Timestamp**: $(date)" >> $GITHUB_STEP_SUMMARY
