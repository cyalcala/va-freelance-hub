name: Deploy Trigger.dev

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
          
      - name: Install dependencies
        run: bun install --frozen-lockfile
        
      - name: Deploy to Trigger.dev
        run: bun run trigger:deploy > deploy.log 2>&1 || (cat deploy.log && exit 1)
        env:
          TRIGGER_ACCESS_TOKEN: ${{ secrets.TRIGGER_ACCESS_TOKEN }}
          TURSO_DATABASE_URL: "libsql://cyrus-freelance-cyrusalcala.aws-ap-northeast-1.turso.io"
          TURSO_AUTH_TOKEN: "dummy-token-for-build"

      - name: Commit Deploy Log on Failure
        if: failure()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b deploy-error-logs
          git add deploy.log || true
          git commit -m "chore: save deploy error log [skip ci]" || true
          git push origin deploy-error-logs -f || true
