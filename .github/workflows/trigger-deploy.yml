name: Deploy Trigger.dev

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
          
      - name: Install dependencies
        run: bun install --frozen-lockfile
        
      - name: Deploy to Trigger.dev
        run: bun run trigger:deploy > deploy.log 2>&1 || (cat deploy.log && exit 1)
        env:
          TRIGGER_ACCESS_TOKEN: ${{ secrets.TRIGGER_ACCESS_TOKEN }}
          TURSO_DATABASE_URL: "libsql://cyrus-freelance-cyrusalcala.aws-ap-northeast-1.turso.io"
          TURSO_AUTH_TOKEN: "dummy-token-for-build"

      - name: Create Issue with Deploy Log
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const log = fs.readFileSync('deploy.log', 'utf8').slice(-65000);
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Deploy Failure ${context.sha}`,
              body: '```sh\n' + log + '\n```'
            });
