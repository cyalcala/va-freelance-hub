name: Deploy Trigger.dev

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  validate:
    name: 🛑 Invariant Suite Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run Invariant Suite
        run: bun test

  deploy:
    name: 🚀 Production Promotion
    needs: [validate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: 🗄️ Atomic DB Migration
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: bun run --cwd packages/db migrate

      - name: ⚛️ Deploy to Trigger.dev
        env:
          TRIGGER_ACCESS_TOKEN: ${{ secrets.TRIGGER_ACCESS_TOKEN }}
        run: |
          # Atomic Deployment without Secret Leakage
          bun run trigger:deploy > deploy.log 2>&1
          VERSION=$(grep -oE "[0-9]{8}\.[0-9]+" deploy.log | head -n 1)
          if [ ! -z "$VERSION" ]; then
            echo "Promoting version: $VERSION"
            bunx trigger.dev@4.4.3 promote $VERSION --env prod
          else
            echo "::error::Could not detect version for promotion."
            exit 1
          fi

      - name: ⚛️ Trigger Vercel Synchronization
        env:
          VERCEL_DEPLOY_WEBHOOK: ${{ secrets.VERCEL_DEPLOY_WEBHOOK }}
        run: |
          if [ -n "$VERCEL_DEPLOY_WEBHOOK" ]; then
            curl -X POST "$VERCEL_DEPLOY_WEBHOOK"
            echo "Vercel rebuild triggered."
          fi

      - name: 🛡️ Wait for Vercel Health (Edge Consistency)
        timeout-minutes: 10
        run: |
          echo "Waiting for Vercel deployment to reach stability..."
          URL="https://va-freelance-hub-web.vercel.app"
          until curl -s --fail "$URL" > /dev/null; do
            echo "Vercel not ready yet... Retrying in 15s"
            sleep 15
          done
          echo "Vercel is Healthy. Atomic sync complete."
