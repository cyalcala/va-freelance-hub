name: 🕐 Deploy Freshness Cron Worker

# Deploys the standalone Cron Trigger Worker when its files change. The Worker
# reads PROXY_SECRET from its own Worker secret (set once, manually, per the
# workers/freshness-cron/README) — this workflow only ships the code + schedule.
on:
  push:
    branches: [main]
    paths:
      - 'workers/freshness-cron/**'
  workflow_dispatch:

concurrency:
  group: deploy-freshness-cron
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Worker
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: workers/freshness-cron
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: 🥟 Setup Bun Runtime
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: 🚀 Deploy Worker (code + cron schedule)
        run: bunx wrangler@4 deploy
