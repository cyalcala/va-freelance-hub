name: 🧑‍⚕️ Sovereign Medic Pulse (Weekly Health Digest)

# Tier-1 maintenance bot (2026-07-04): automates the read-only data-quality
# snapshot that major audits previously gathered by hand. Runs weekly, writes
# docs/health-digest-latest.md, and commits it (same guarded pattern as the
# daily source-health rollup). All queries are read-only.

on:
  schedule:
    - cron: '0 2 * * 0' # Weekly, Sunday 02:00 UTC
  workflow_dispatch:

concurrency:
  group: gha-medic-pipeline
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  medic:
    name: Weekly Data-Quality Digest
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gather Core Metrics (read-only)
        working-directory: apps/web
        run: |
          set -euo pipefail
          npx wrangler@4 d1 execute remoteph-jobs-db --remote --json --command "
            SELECT
              (SELECT COUNT(*) FROM opportunities WHERE is_active=1) AS active,
              (SELECT COUNT(*) FROM opportunities) AS total,
              (SELECT COUNT(*) FROM va_directory) AS companies,
              (SELECT COUNT(*) FROM opportunities WHERE is_active=1 AND unixepoch(coalesce(posted_at, scraped_at)) < unixepoch('now','-30 days')) AS older_30d,
              (SELECT COUNT(*) FROM opportunities WHERE is_active=1 AND last_seen_in_feed_at IS NOT NULL AND unixepoch(last_seen_in_feed_at) < unixepoch('now','-14 days')) AS not_seen_14d,
              (SELECT COUNT(*) FROM opportunities WHERE is_active=1 AND last_verified_at IS NULL) AS never_verified,
              (SELECT COUNT(*) FROM opportunities WHERE is_active=1 AND company IS NULL) AS missing_company,
              (SELECT COUNT(*) FROM (SELECT 1 FROM opportunities WHERE is_active=1 GROUP BY lower(title), lower(coalesce(company,'')) HAVING COUNT(*)>1)) AS dup_title_company_groups;
          " > ../../medic-core.json

      - name: Gather 7-Day Source Reliability (read-only)
        working-directory: apps/web
        run: |
          set -euo pipefail
          npx wrangler@4 d1 execute remoteph-jobs-db --remote --json --command "
            SELECT source_id,
                   COUNT(*) AS attempts,
                   SUM(CASE WHEN ok=1 THEN 1 ELSE 0 END) AS ok_count,
                   SUM(CASE WHEN skipped=1 THEN 1 ELSE 0 END) AS skipped_count,
                   SUM(count) AS items_seen
            FROM source_fetch_events
            WHERE unixepoch(timestamp) >= unixepoch('now','-7 days')
            GROUP BY source_id
            ORDER BY source_id;
          " > ../../medic-sources.json

      - name: Write And Commit Digest
        run: |
          set -euo pipefail
          git pull --ff-only origin main

          TODAY=$(date -u +"%Y-%m-%d")
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

          if [ "${GITHUB_EVENT_NAME}" = "schedule" ] && [ -f docs/health-digest-latest.md ] && grep -q "^Date: ${TODAY}$" docs/health-digest-latest.md; then
            echo "Digest already exists for ${TODAY}; skipping."
            exit 0
          fi

          CORE=$(jq '.[0].results[0]' medic-core.json)
          {
            echo "# Weekly Health Digest"
            echo ""
            echo "Date: ${TODAY}"
            echo "Workflow run: ${RUN_URL}"
            echo "Generated by: Medic pulse (read-only queries; no mutations)"
            echo ""
            echo "## Core Metrics"
            echo ""
            echo "| Metric | Value |"
            echo "| --- | ---: |"
            echo "| Active opportunities | $(echo "$CORE" | jq -r '.active') |"
            echo "| Total opportunities | $(echo "$CORE" | jq -r '.total') |"
            echo "| Directory companies | $(echo "$CORE" | jq -r '.companies') |"
            echo "| Active older than 30 days | $(echo "$CORE" | jq -r '.older_30d') |"
            echo "| Active unseen in feed 14+ days | $(echo "$CORE" | jq -r '.not_seen_14d') |"
            echo "| Active never link-verified | $(echo "$CORE" | jq -r '.never_verified') |"
            echo "| Active missing company | $(echo "$CORE" | jq -r '.missing_company') |"
            echo "| Same title+company dup groups | $(echo "$CORE" | jq -r '.dup_title_company_groups') |"
            echo ""
            echo "## Source Reliability (last 7 days)"
            echo ""
            echo "| Source | Attempts | OK | Skipped | Items Seen |"
            echo "| --- | ---: | ---: | ---: | ---: |"
            jq -r '.[0].results[] | "| \(.source_id) | \(.attempts) | \(.ok_count) | \(.skipped_count) | \(.items_seen) |"' medic-sources.json
            echo ""
            echo "Compare week-over-week via git history of this file."
            echo "Escalation guide: docs/major-audit-2026-07-04.md."
          } > docs/health-digest-latest.md

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/health-digest-latest.md

          if git diff --cached --quiet; then
            echo "No digest changes to commit."
            exit 0
          fi

          git commit -m "docs: update weekly health digest"
          # Bounded rebase-retry: Medic runs weekly, so a lost push means no
          # digest for 7 days. Another job pushing in the window must not cost
          # the whole week. This bot owns its own file, so rebases are clean.
          for attempt in 1 2 3 4 5; do
            if git push origin HEAD:main; then break; fi
            echo "Push rejected (attempt $attempt); rebasing on main and retrying."
            git pull --rebase origin main
          done

      - name: 📊 Medic Summary
        if: always()
        continue-on-error: true
        run: |
          echo "### 🧑‍⚕️ Sovereign Medic Report" >> $GITHUB_STEP_SUMMARY
          if [ -f docs/health-digest-latest.md ]; then
            cat docs/health-digest-latest.md >> $GITHUB_STEP_SUMMARY
          else
            echo "- Digest not generated this run." >> $GITHUB_STEP_SUMMARY
          fi
