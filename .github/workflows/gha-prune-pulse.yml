name: 🧹 Sovereign Database Pruning (Deduplication)

on:
  schedule:
    - cron: '0 0 * * *' # Run daily at midnight UTC
  workflow_dispatch: 

concurrency:
  group: gha-prune-pipeline
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  prune:
    name: Execute Duplicate Pruning
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: 🚀 Trigger Prune API
        run: |
          RESPONSE=$(curl -s -w "\\n%{http_code}" -X POST "https://remotejobs-ph.pages.dev/api/cron/prune" \
            -H "Authorization: Bearer ${{ secrets.PROXY_SECRET }}" \
            -H "Content-Type: application/json")
          
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          
          echo "Response Code: $HTTP_CODE"
          echo "Response Body: $BODY"
          
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Pruning failed with status $HTTP_CODE"
            exit 1
          fi
          
          ARCHIVED_HASH=$(echo $BODY | jq -r '.archivedHashDuplicates // 0')
          PRUNE_MODE=$(echo $BODY | jq -r '.mode // "unknown"')

          echo "ARCHIVED_HASH=$ARCHIVED_HASH" >> $GITHUB_ENV
          echo "PRUNE_MODE=$PRUNE_MODE" >> $GITHUB_ENV

          if [ "$PRUNE_MODE" != "soft-archive" ]; then
            echo "::warning::Prune endpoint did not report soft-archive mode (got: $PRUNE_MODE). Verify no hard deletes are happening."
          fi

      - name: 📊 Generate Prune Summary
        if: always()
        continue-on-error: true
        run: |
          echo "### 🧹 Sovereign Database Pruning Report" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ✅ Pruning Complete" >> $GITHUB_STEP_SUMMARY
          echo "- **Mode**: $PRUNE_MODE (rows archived, never deleted)" >> $GITHUB_STEP_SUMMARY
          echo "- **Duplicate Active Rows Archived (Hash+Company)**: $ARCHIVED_HASH" >> $GITHUB_STEP_SUMMARY
          echo "- **Timestamp**: $(date)" >> $GITHUB_STEP_SUMMARY
